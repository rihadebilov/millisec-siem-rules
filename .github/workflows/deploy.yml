name: Deploy SIEM Rules

on:
  push:
    branches:
      - main
    paths:
      - 'splunk/rules/*.yaml'
      - 'splunk/deploy_splunk.py'
      - 'qradar/rules/*.json'           # QRadar faylları əlavə edildi
      - 'qradar/deploy_qradar.py'       # QRadar skripti əlavə edildi
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (splunk / qradar / all)'
        required: true
        default: 'all'

jobs:
  # ── Splunk Deployment ────────────────────────────────────────────────────────
  deploy-splunk:
    name: Deploy → Splunk
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'splunk' || github.event.inputs.target == 'all'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml urllib3

      - name: Validate YAML rule files
        run: |
          python - <<'EOF'
          import yaml, sys
          from pathlib import Path
          errors = 0
          for f in sorted(Path("splunk/rules").glob("*.yaml")):
              if f.name == ".gitkeep":
                  continue
              try:
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  required = ["id", "name", "severity", "mitre_attack", "splunk"]
                  for field in required:
                      if field not in data:
                          print(f"❌ {f.name}: missing field '{field}'")
                          errors += 1
                  print(f"✅ {f.name}: OK ({data.get('id','?')} — {data.get('name','?')})")
              except Exception as e:
                  print(f"❌ {f.name}: {e}")
                  errors += 1
          if errors:
              print(f"\n{errors} validation error(s). Aborting.")
              sys.exit(1)
          print(f"\nAll rule files are valid.")
          EOF

      - name: Preflight Splunk auth
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python - <<'EOF'
          import os, sys, requests, urllib3
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          
          h=os.environ["SPLUNK_HOST"]
          p=os.getenv("SPLUNK_PORT","8089")
          t=os.environ["SPLUNK_TOKEN"]
          
          r=requests.get(
            f"https://{h}:{p}/services/server/info?output_mode=json",
            headers={"Authorization": f"Bearer {t}"},
            verify=False, timeout=20
          )
          if r.status_code >= 400:
            print(f"❌ Splunk preflight failed: HTTP {r.status_code} {r.text[:300]}")
            sys.exit(1)
          print("✅ Splunk preflight OK: Token is valid!")
          EOF

      - name: Deploy Splunk Rules
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          SPLUNK_USER: ${{ secrets.SPLUNK_USER }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          python splunk/deploy_splunk.py

  # ── QRadar Deployment ────────────────────────────────────────────────────────
  deploy-qradar:
    name: Deploy → QRadar
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'qradar' || github.event.inputs.target == 'all'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Preflight QRadar auth
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_HOST }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: |
          python - <<'EOF'
          import os, sys, requests, urllib3
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          
          h=os.environ["QRADAR_HOST"]
          t=os.environ["QRADAR_TOKEN"]
          
          r=requests.get(
            f"https://{h}:443/api/system/about",
            headers={"SEC": t, "Accept": "application/json"},
            verify=False, timeout=20
          )
          if r.status_code >= 400:
            print(f"❌ QRadar preflight failed: HTTP {r.status_code} {r.text[:300]}")
            sys.exit(1)
          print("✅ QRadar preflight OK: Token is valid!")
          EOF

      - name: Deploy QRadar Rules
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_HOST }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: |
          python qradar/deploy_qradar.py
