id: MS-SPL-004
name: "MS-SPL-004: Cross-Site Scripting (XSS) Attempt Detection"
description: >
  Detects reflected, stored, and DOM-based XSS attack patterns in HTTP
  requests captured by WAF logs. Identifies script injection attempts
  via common XSS payloads including event handlers, javascript: URI scheme,
  and HTML tag injection.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.0"
severity: high
status: production

mitre_attack:
  technique: "T1059.007"
  tactic: "Execution"
  subtechnique: "Command and Scripting Interpreter: JavaScript"

references:
  - https://attack.mitre.org/techniques/T1059/007/
  - https://owasp.org/www-community/attacks/xss/
  - https://cheatsheetseries.owasp.org/cheatsheets/XSS_Prevention_Cheat_Sheet.html

tags:
  - xss
  - owasp-a03
  - web-attack
  - javascript
  - waf

splunk:
  index: waf
  search: |
    index=waf
    | eval request = coalesce(uri, request_uri, url, _raw)
    | eval src_ip = coalesce(client_ip, src_ip, remote_addr)
    | eval uri_path = replace(request, "\?.*$", "")
    | where match(lower(request), "<script|</script|javascript:|onerror\s*=|onload\s*=|onclick\s*=|onmouseover\s*=|onfocus\s*=|onblur\s*=|eval\s*\(|document\.cookie|document\.write|window\.location|alert\s*\(|prompt\s*\(|confirm\s*\(|<img\s.*src\s*=|<iframe|<svg\s.*on|expression\s*\(|vbscript:")
    | stats
        count as hit_count
        values(request) as payloads
        values(uri_path) as affected_paths
        dc(request) as unique_payloads
        min(_time) as first_seen
        max(_time) as last_seen
        by src_ip
    | where hit_count >= 1
    | eval
        severity = case(hit_count >= 10, "HIGH", true(), "MEDIUM"),
        mitre_technique = "T1059.007",
        mitre_tactic = "Execution",
        rule_id = "MS-SPL-004",
        rule_name = "Cross-Site Scripting XSS Attempt Detection",
        attack_type = "XSS"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, src_ip, hit_count, unique_payloads, affected_paths, first_seen, last_seen, severity, mitre_technique
    | sort - hit_count
  cron_schedule: "*/5 * * * *"
  earliest_time: "-5m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
