id: MS-SPL-013
name: "MS-SPL-013: Persistence via Registry Run Key Modification"
description: >
  Detects suspicious modifications to Windows Registry Run and RunOnce keys
  used for persistence via Sysmon EventID 13 (Registry Value Set) and
  Windows EventID 4657. Monitors all HKLM and HKCU autorun locations
  for additions by non-system processes.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.2"
severity: high
status: production

mitre_attack:
  technique: "T1547.001"
  tactic: "Persistence"
  subtechnique: "Boot or Logon Autostart Execution: Registry Run Keys / Startup Folder"

references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_run_key_via_suspicious_path.yml
  - https://docs.microsoft.com/en-us/windows/win32/setupapi/run-and-runonce-registry-keys

tags:
  - persistence
  - registry
  - run-key
  - autorun
  - sysmon
  - windows

splunk:
  index: xdr
  search: |
    (index=xdr OR index=main)
    source="WinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=13
    | eval reg_key = coalesce(TargetObject, RegistryKey, "")
    | where match(reg_key, "\\\\Run\\\\|\\\\RunOnce\\\\|\\\\RunOnceEx\\\\|\\\\RunServices\\\\|\\\\RunServicesOnce\\\\|\\\\Policies\\\\Explorer\\\\Run\\\\|\\\\Group Policy\\\\Scripts\\\\|\\\\CurrentVersion\\\\Windows\\\\Load|\\\\CurrentVersion\\\\Winlogon\\\\Shell|\\\\CurrentVersion\\\\Winlogon\\\\Userinit|\\\\CurrentVersion\\\\Explorer\\\\Shell Folders|\\\\CurrentVersion\\\\Explorer\\\\User Shell Folders|\\\\CurrentVersion\\\\Image File Execution Options")
    | eval
        process = coalesce(Image, ProcessImage, ""),
        reg_value = coalesce(Details, RegistryValue, ""),
        user = coalesce(User, SubjectUserName, "")
    | where NOT match(lower(process), "^c:\\\\windows\\\\system32\\\\|^c:\\\\windows\\\\syswow64\\\\|^c:\\\\program files\\\\|^c:\\\\program files \(x86\)\\\\") OR
            match(lower(reg_value), "powershell|cmd|wscript|cscript|mshta|regsvr32|rundll32|certutil|bitsadmin|msiexec|installutil|regasm|regsvcs|temp|appdata|public|programdata|users\\\\.*\\\\downloads")
    | stats
        count as event_count
        values(reg_key) as modified_keys
        values(reg_value) as reg_values
        values(process) as processes
        values(user) as users
        min(_time) as first_seen
        max(_time) as last_seen
        by ComputerName
    | eval
        severity = "HIGH",
        mitre_technique = "T1547.001",
        mitre_tactic = "Persistence",
        rule_id = "MS-SPL-013",
        rule_name = "Persistence via Registry Run Key Modification"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, ComputerName, users, processes, modified_keys, reg_values, event_count, first_seen, last_seen, severity, mitre_technique
    | sort - event_count
  cron_schedule: "*/10 * * * *"
  earliest_time: "-10m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
