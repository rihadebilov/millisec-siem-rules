id: MS-SPL-006
name: "MS-SPL-006: Directory Traversal Attempt Detection"
description: >
  Detects path traversal attempts in HTTP request URIs targeting sensitive
  files outside the web root. Identifies both encoded and plain-text
  traversal sequences (../../) attempting to read /etc/passwd, /etc/shadow,
  Windows SAM, and other critical system files.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.2"
severity: medium
status: production

mitre_attack:
  technique: "T1083"
  tactic: "Discovery"
  subtechnique: "File and Directory Discovery"

references:
  - https://attack.mitre.org/techniques/T1083/
  - https://owasp.org/www-community/attacks/Path_Traversal
  - https://github.com/SigmaHQ/sigma/blob/master/rules/web/web_path_traversal.yml

tags:
  - directory-traversal
  - path-traversal
  - owasp-a01
  - web-attack
  - file-inclusion

splunk:
  index: web_logs
  search: |
    index=web_logs
    | eval uri_raw = coalesce(uri, request_uri, 'cs-uri-stem', url)
    | eval src_ip = coalesce(client_ip, src_ip, 'c-ip', remote_addr)
    | eval status = coalesce(status, http_status, 'sc-status', response_code)
    | where match(uri_raw, "\.\./|\.\.\\\\|%2e%2e%2f|%2e%2e/|\.\.%2f|%2e%2e%5c|%252e%252e|%c0%ae%c0%ae|/etc/passwd|/etc/shadow|/etc/hosts|/proc/self|/windows/system32|/win32|boot\.ini|web\.config|\.htaccess|\.env|wp-config\.php|config\.php|database\.yml")
    | stats
        count as hit_count
        values(uri_raw) as traversal_paths
        values(status) as response_codes
        dc(uri_raw) as unique_paths
        min(_time) as first_seen
        max(_time) as last_seen
        by src_ip
    | where hit_count >= 1
    | eval
        severity = case(hit_count >= 20, "HIGH", true(), "MEDIUM"),
        mitre_technique = "T1083",
        mitre_tactic = "Discovery",
        rule_id = "MS-SPL-006",
        rule_name = "Directory Traversal Attempt Detection",
        attack_type = "Path Traversal"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, src_ip, hit_count, unique_paths, traversal_paths, response_codes, first_seen, last_seen, severity, mitre_technique
    | sort - hit_count
  cron_schedule: "*/5 * * * *"
  earliest_time: "-5m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
