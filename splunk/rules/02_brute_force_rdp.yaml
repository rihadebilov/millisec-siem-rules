id: MS-SPL-002
name: "MS-SPL-002: Brute Force RDP — Windows EventID 4625"
description: >
  Detects multiple failed Windows logon attempts (EventID 4625) targeting
  Remote Desktop Protocol (LogonType 10 or 3). High failure counts from a
  single source within 5 minutes indicate RDP brute-force activity.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.1"
severity: high
status: production

mitre_attack:
  technique: "T1110.001"
  tactic: "Credential Access"
  subtechnique: "Brute Force: Password Guessing"

references:
  - https://attack.mitre.org/techniques/T1110/001/
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625

tags:
  - brute-force
  - rdp
  - windows
  - authentication
  - eventid-4625

splunk:
  index: xdr
  search: |
    (index=xdr OR index=main) source="WinEventLog:Security" EventCode=4625
    | where LogonType IN ("10", "3", "7")
    | bucket _time span=5m
    | stats
        count as failure_count
        dc(Account_Name) as unique_accounts
        values(Account_Name) as targeted_accounts
        values(LogonType) as logon_types
        min(_time) as first_seen
        max(_time) as last_seen
        by IpAddress, ComputerName, _time
    | where failure_count >= 5 AND IpAddress != "-" AND IpAddress != "127.0.0.1"
    | eval
        duration_sec = last_seen - first_seen,
        severity = "HIGH",
        mitre_technique = "T1110.001",
        mitre_tactic = "Credential Access",
        rule_id = "MS-SPL-002",
        rule_name = "Brute Force RDP Windows EventID 4625"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, IpAddress, ComputerName, failure_count, unique_accounts, targeted_accounts, first_seen, last_seen, severity, mitre_technique
    | sort - failure_count
  cron_schedule: "*/5 * * * *"
  earliest_time: "-5m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
