id: MS-SPL-014
name: "MS-SPL-014: T-Pot Honeypot — Mass Hit Spike Detection"
description: >
  Detects statistically significant spikes in honeypot hit counts from T-Pot
  relative to a trailing 1-hour baseline, indicating active scanning,
  reconnaissance, or coordinated attack campaigns. Uses dynamic thresholding
  (mean + 3*stdev) instead of static counts to filter out background internet
  noise, and correlates hit volume, unique source IPs, and targeted service
  ports to distinguish targeted attacks.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-07-14"
version: "1.4"
severity: medium
status: production
mitre_attack:
  technique: "T1595"
  tactic: "Reconnaissance"
  subtechnique: "Active Scanning"
references:
  - https://attack.mitre.org/techniques/T1595/
  - https://github.com/telekom-security/tpotce
  - https://github.com/SigmaHQ/sigma/blob/master/rules/network/net_honeypot.yml
tags:
  - honeypot
  - reconnaissance
  - scanning
  - tpot
  - threat-intel
  - anomaly-detection
splunk:
  index: tpot
  search: |
    index=tpot
    | eval src_ip = coalesce(src_ip, src, remote, source_ip)
    | rex field=_raw "\"src_ip\":\s*\"(?P<src_ip_json>[^\"]+)\""
    | eval src_ip = coalesce(src_ip_json, src_ip)
    | eval dest_port = coalesce(dest_port, port, dpt)
    | bucket _time span=5m
    | stats
        count as total_hits
        dc(src_ip) as unique_attackers
        dc(dest_port) as unique_ports_targeted
        values(dest_port) as ports
        values(src_ip) as attacker_ips
        by _time
    | streamstats window=12 current=f
        avg(total_hits) as avg_hits
        stdev(total_hits) as std_hits
        avg(unique_attackers) as avg_attackers
        stdev(unique_attackers) as std_attackers
    | eval std_hits = coalesce(std_hits, 0), std_attackers = coalesce(std_attackers, 0)
    | eval hits_threshold = avg_hits + (3 * std_hits)
    | eval attackers_threshold = avg_attackers + (3 * std_attackers)
    | where (avg_hits > 0 AND total_hits > hits_threshold AND total_hits > 150)
        OR (avg_attackers > 0 AND unique_attackers > attackers_threshold AND unique_attackers > 40)
    | eval
        attack_intensity = case(
            total_hits >= 500 OR unique_attackers >= 100, "MASS ATTACK",
            total_hits >= 200 OR unique_attackers >= 50,  "HIGH INTENSITY",
            true(), "ELEVATED (baseline üzərində anomaliya)"),
        severity = case(
            total_hits >= 500 OR unique_attackers >= 100, "CRITICAL",
            total_hits >= 200 OR unique_attackers >= 50,  "HIGH",
            true(), "MEDIUM"),
        mitre_technique = "T1595",
        mitre_tactic = "Reconnaissance",
        rule_id = "MS-SPL-014",
        rule_name = "T-Pot Honeypot Mass Hit Spike Detection"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(_time)
    | table rule_id, rule_name, _time, total_hits, avg_hits, hits_threshold, unique_attackers, avg_attackers, attackers_threshold, unique_ports_targeted, ports, attack_intensity, severity, mitre_technique
    | sort - total_hits
  cron_schedule: "*/5 * * * *"
  earliest_time: "-1h@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
  alert.suppress: 1
  alert.suppress.period: "4h"
