id: MS-SPL-008
name: "MS-SPL-008: Mimikatz Credential Dumping Detection"
description: >
  Detects Mimikatz and credential dumping tool usage via process name matching,
  command-line arguments, Sysmon process creation (EventID 1), and
  Windows Security EventID 4656/4663 (LSASS memory access).
  Also detects common renaming/obfuscation techniques.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.2"
severity: critical
status: production

mitre_attack:
  technique: "T1003.001"
  tactic: "Credential Access"
  subtechnique: "OS Credential Dumping: LSASS Memory"

references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_mimikatz.yml
  - https://github.com/gentilkiwi/mimikatz

tags:
  - mimikatz
  - credential-dumping
  - lsass
  - credential-access
  - windows

splunk:
  index: xdr
  search: |
    (index=xdr OR index=main)
    (
        (source="WinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=1)
        OR
        (source="WinEventLog:Security" EventCode IN (4656, 4663, 4688))
    )
    | eval process = coalesce(Image, NewProcessName, ""),
           cmd = coalesce(CommandLine, ProcessCommandLine, ""),
           target = coalesce(ObjectName, TargetObject, "")
    | where
        match(lower(process), "mimikatz|mimilib|mimidrv|wce\.exe|pwdump|procdump|fgdump|gsecdump") OR
        match(lower(cmd), "sekurlsa::|lsadump::|privilege::debug|mimikatz|kerberos::ptth|kerberos::ptt|token::elevate|vault::cred|dpapi::|lsass") OR
        match(lower(target), "\\\\lsass\.exe") OR
        (match(lower(process), "procdump") AND match(lower(cmd), "lsass"))
    | stats
        count as event_count
        values(process) as processes
        values(cmd) as commands
        values(User) as users
        min(_time) as first_seen
        max(_time) as last_seen
        by ComputerName
    | eval
        severity = "CRITICAL",
        mitre_technique = "T1003.001",
        mitre_tactic = "Credential Access",
        rule_id = "MS-SPL-008",
        rule_name = "Mimikatz Credential Dumping Detection"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, ComputerName, users, processes, commands, event_count, first_seen, last_seen, severity, mitre_technique
    | sort - event_count
  cron_schedule: "*/5 * * * *"
  earliest_time: "-5m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
