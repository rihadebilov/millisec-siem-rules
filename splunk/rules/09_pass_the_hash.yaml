id: MS-SPL-009
name: "MS-SPL-009: Pass-the-Hash NTLM Lateral Movement"
description: >
  Detects Pass-the-Hash (PtH) attacks using Windows Security EventID 4624
  with LogonType 3 (Network) and NTLM authentication where the source is
  not a domain controller or the account name is administrator-level.
  Correlates with multiple rapid lateral movement attempts across hosts.
author: "MilliSec Blue Team — Rihad Ebilov"
date: "2026-06-19"
version: "1.1"
severity: critical
status: production

mitre_attack:
  technique: "T1550.002"
  tactic: "Lateral Movement"
  subtechnique: "Use Alternate Authentication Material: Pass the Hash"

references:
  - https://attack.mitre.org/techniques/T1550/002/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_pass_the_hash.yml
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4624

tags:
  - pass-the-hash
  - lateral-movement
  - ntlm
  - credential-access
  - windows

splunk:
  index: xdr
  search: |
    (index=xdr OR index=main) source="WinEventLog:Security" EventCode=4624
    LogonType=3
    AuthenticationPackageName=NTLM
    | where
        Account_Name != "ANONYMOUS LOGON" AND
        Account_Name != "-" AND
        NOT match(Account_Name, "\$$") AND
        IpAddress != "-" AND
        IpAddress != "127.0.0.1" AND
        IpAddress != "::1"
    | bucket _time span=5m
    | stats
        count as login_count
        dc(ComputerName) as unique_targets
        values(ComputerName) as target_hosts
        values(Account_Name) as accounts
        values(WorkstationName) as source_workstations
        min(_time) as first_seen
        max(_time) as last_seen
        by IpAddress, _time
    | where login_count >= 3 AND unique_targets >= 2
    | eval
        severity = "CRITICAL",
        mitre_technique = "T1550.002",
        mitre_tactic = "Lateral Movement",
        rule_id = "MS-SPL-009",
        rule_name = "Pass-the-Hash NTLM Lateral Movement"
    | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(first_seen) ctime(last_seen)
    | table rule_id, rule_name, IpAddress, accounts, login_count, unique_targets, target_hosts, source_workstations, first_seen, last_seen, severity, mitre_technique
    | sort - login_count
  cron_schedule: "*/5 * * * *"
  earliest_time: "-5m@m"
  latest_time: "now"
  alert_threshold: 0
  alert_comparator: "greater than"
